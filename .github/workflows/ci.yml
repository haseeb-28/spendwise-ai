name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          # Stub env vars so imports don't crash during test
          POCKETBASE_URL: http://localhost:8090
          POCKETBASE_ADMIN_EMAIL: test@test.com
          POCKETBASE_ADMIN_PASSWORD: testpassword
          ANTHROPIC_API_KEY: sk-ant-test
          RESEND_API_KEY: re_test
          RESEND_FROM_EMAIL: test@test.com
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:8090
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test
